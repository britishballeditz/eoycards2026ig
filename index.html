<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>CRGS Confirmation</title>

  <!-- DM Sans Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "DM Sans", sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;

      background:
        radial-gradient(circle at top left, rgba(190,120,255,0.25), transparent 40%),
        radial-gradient(circle at bottom right, rgba(90,120,255,0.2), transparent 40%),
        linear-gradient(135deg, #160028, #0b1230 60%, #08131d);
    }

    .glass-card {
      width: 430px;
      padding: 42px;
      border-radius: 30px;

      background: rgba(255,255,255,0.08);

      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);

      border: 1px solid rgba(255,255,255,0.15);

      box-shadow:
        0 8px 32px rgba(0,0,0,0.35),
        inset 0 1px 1px rgba(255,255,255,0.15);

      position: relative;
      overflow: hidden;
    }

    .glass-card::before {
      content: "";
      position: absolute;
      inset: 0;

      background:
        linear-gradient(
          135deg,
          rgba(255,255,255,0.16),
          rgba(255,255,255,0.03)
        );

      pointer-events: none;
    }

    h1 {
      color: white;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }

    p {
      color: rgba(255,255,255,0.75);
      line-height: 1.6;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 14px;

      padding: 18px;
      border-radius: 20px;

      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);

      transition: 0.25s ease;
      cursor: pointer;

      position: relative;
      z-index: 1;
    }

    .checkbox-row:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-2px);
    }

    input[type="checkbox"] {
      appearance: none;

      width: 26px;
      height: 26px;

      border-radius: 8px;

      border: 2px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.08);

      display: grid;
      place-items: center;

      cursor: pointer;
      transition: 0.2s ease;
      flex-shrink: 0;
    }

    input[type="checkbox"]::after {
      content: "✓";

      color: white;
      font-size: 15px;
      font-weight: bold;

      transform: scale(0);
      transition: 0.15s ease;
    }

    input[type="checkbox"]:checked {
      background: rgba(170,120,255,0.8);
      border-color: rgba(255,255,255,0.7);

      box-shadow:
        0 0 20px rgba(170,120,255,0.45);
    }

    input[type="checkbox"]:checked::after {
      transform: scale(1);
    }

    label {
      color: white;
      font-size: 1.05rem;
      user-select: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="glass-card">
    <h1>CRGS Confirmation</h1>

    <p>
      Please confirm that you acknowledge you are in CRGS. Also W TAHEEM
    </p>

    <div class="checkbox-row">
      <input type="checkbox" id="accept" />
      <label for="accept">
        I accept that I am in CRGS
      </label>
    </div>
  </div>

  <script>
    const checkbox = document.getElementById("accept");

    checkbox.addEventListener("change", () => {
      if (checkbox.checked) {
        window.location.href =
          "https://gizmo.ai/deck/82547789?p=eiMdiM8bzFs&t=1&featureId=2&deckName=EOYs&deckColour=fbbf24&senderName=Taheem+Hossainn&senderUserId=16215522";
      }
    });
  </script>

</body>
</html>
